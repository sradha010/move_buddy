# ============================================================
# BuddyRide API - Nginx Configuration
# Target: Ubuntu 22.04 / Hostinger VPS
# Domain: api.buddyride.com
# ============================================================

# ------------------------------------
# Rate Limiting Zones
# ------------------------------------
# General API rate limit: 30 req/s per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# Auth endpoints (OTP, login): 5 req/min per IP
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

# Upload endpoints: 10 req/min per IP
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;

# ------------------------------------
# Upstream Backend (Node.js / PM2)
# ------------------------------------
upstream backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ------------------------------------
# HTTP -> HTTPS Redirect
# ------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.buddyride.com;

    # ACME challenge for Certbot renewal
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ------------------------------------
# HTTPS Server
# ------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.buddyride.com;

    # ------ SSL Certificates (Let's Encrypt / Certbot) ------
    ssl_certificate     /etc/letsencrypt/live/api.buddyride.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.buddyride.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.buddyride.com/chain.pem;

    # ------ SSL Hardening ------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ------ HSTS ------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ------ Security Headers ------
    add_header X-Frame-Options              "DENY"                              always;
    add_header X-Content-Type-Options       "nosniff"                           always;
    add_header X-XSS-Protection             "1; mode=block"                     always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy           "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy      "default-src 'none'; frame-ancestors 'none';" always;

    # ------ General Settings ------
    client_max_body_size 10m;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;
    server_tokens off;

    # ------ Gzip Compression ------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml;

    # ------ Logging ------
    access_log /var/log/nginx/buddyride.access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/buddyride.error.log warn;

    # ------ Block Common Attack Vectors ------
    # Block hidden files (e.g., .env, .git)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block common exploit probes
    location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi|wp-admin|xmlrpc\.php)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ------ Health Check (no rate limit, no auth needed) ------
    location = /api/health {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ------ Auth Endpoints (strict rate limit) ------
    location ~ ^/api/(auth|otp)/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }

    # ------ Upload Endpoints ------
    location ~ ^/api/(upload|documents|profile-photo)/ {
        limit_req zone=upload_limit burst=5 nodelay;
        limit_req_status 429;

        client_max_body_size 10m;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_request_buffering off;
    }

    # ------ Main API (general rate limit) ------
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ------ Catch-All: Redirect to API root ------
    location / {
        return 404 '{"status":404,"message":"Not found"}';
        add_header Content-Type application/json always;
    }
}
